<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Screener | Phase 1</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  line-height: 1.5;
}
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
header {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 15px;
  border-bottom: 1px solid #30363d;
  margin-bottom: 15px;
}
h1 { font-size: 1.5rem; color: #58a6ff; }
.controls, .filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
select, button, input {
  background: #21262d;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.9rem;
}
select[multiple] {
  min-width: 150px;
  height: auto;
}
button {
  background: #238636;
  border-color: #238636;
  cursor: pointer;
}
button:hover { background: #2ea043; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.filters {
  padding: 10px;
  background: #161b22;
  border-radius: 8px;
  margin-bottom: 15px;
}
.filters label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
.status {
  padding: 12px;
  background: #161b22;
  border-radius: 8px;
  margin-bottom: 15px;
  text-align: center;
  color: #8b949e;
}
.status.live { color: #3fb950; }
.status.demo { color: #d29922; }
.status.error { color: #f85149; background: #3d0c0c; }
.results { display: grid; gap: 12px; }

.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: #58a6ff; }
.card.LONG { border-left: 4px solid #3fb950; }
.card.SHORT { border-left: 4px solid #f85149; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.symbol { font-size: 1.3rem; font-weight: 600; color: #f0f6fc; }
.side-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}
.side-badge.LONG { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
.side-badge.SHORT { background: rgba(248, 81, 73, 0.2); color: #f85149; }

.card-scores {
  display: flex;
  gap: 20px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.score-box { text-align: center; }
.score-box .label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
.score-box .value { font-size: 1.4rem; font-weight: 700; }
.score-box .value.high { color: #3fb950; }
.score-box .value.med { color: #d29922; }
.score-box .value.low { color: #8b949e; }

.bar-metrics {
  display: grid;
  gap: 8px;
  margin: 12px 0;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.8rem;
}
.bar-label {
  width: 100px;
  color: #8b949e;
  text-transform: uppercase;
  font-size: 0.7rem;
}
.bar-container {
  flex: 1;
  height: 20px;
  background: #0d1117;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #fff;
}
.bar-fill.positive { background: linear-gradient(90deg, #238636, #2ea043); }
.bar-fill.negative { background: linear-gradient(90deg, #da3633, #f85149); }
.bar-fill.neutral { background: linear-gradient(90deg, #1f6feb, #58a6ff); }
.bar-fill.warning { background: linear-gradient(90deg, #9e6a03, #d29922); }
.bar-value {
  width: 70px;
  text-align: right;
  color: #c9d1d9;
  font-family: monospace;
}

.entry-plan {
  margin-top: 12px;
  padding: 12px;
  background: #0d1117;
  border-radius: 6px;
  font-size: 0.85rem;
}
.entry-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.entry-row .label { color: #8b949e; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 Phase 1 Screener</h1>
      <div class="controls">
        <select id="timeframe" onchange="refreshData()">
          <option value="1d">1 Day</option>
          <option value="4h">4 Hour</option>
          <option value="1h">1 Hour</option>
          <option value="30m">30 Min</option>
          <option value="15m">15 Min</option>
          <option value="5m" selected>5 Min</option>
        </select>
        <select id="apis" multiple size="3" onchange="refreshData()">
          <option value="binance" selected>Binance</option>
          <option value="codex">Codex</option>
        </select>
        <select id="view" onchange="render()">
          <option value="discovery" selected>Discovery</option>
          <option value="entries">Entries</option>
          <option value="all">All</option>
        </select>
        <button id="refreshBtn" onclick="refreshData()">↻ Refresh</button>
      </div>
    </header>

    <div class="filters">
      <label><input type="checkbox" id="filterLong" checked onchange="render()"> LONG</label>
      <label><input type="checkbox" id="filterShort" checked onchange="render()"> SHORT</label>
      <label>Min Conf: <input type="range" id="minConf" min="0" max="100" value="45" oninput="updateConfDisplay(); render()"> <span id="confVal">45</span></label>
      <label>Max: <input type="number" id="topN" value="20" min="1" max="50" style="width:50px;" onchange="render()"></label>
    </div>

    <div id="status" class="status">Checking for local server...</div>
    <div id="results" class="results"></div>
  </div>

  <script>
const API_BASE = 'http://localhost:3000';
let isLive = false;
let currentData = [];

// Demo data fallback
const DEMO_DATA = [
  { symbol: 'BTC/USDT:USDT', side: 'LONG', confidence: 83.6, discoveryScore: 60.6, price: 65000, rsi14: 60.6, priceChg5m: 0.8, volSpike: 3.1, volDelta: 65, obImb: 0.59, oiDeltaPct: -2.16, oiDelta: 35, funding: -0.0004, fundingBar: 45, takerRatio: 1.12, takerBar: 62, buySellVolRatio: 1.25, buySellVolNetPct: 12.5, whaleScore: 46.6, whaleBar: 47, srProximity: 86.1, entryLow: 64675, entryHigh: 65195, stop: 63440, tp1: 66560, tp2: 67860, rr: 2.71, invalidation: '5m close below EMA50', riskUsd: 50, sizeUnits: 0.033, discoveryWhy: 'Flow intensity 1.25 | OIΔ 2.3%', why: 'EMA20>EMA50 | RSI 58.2 | OI↑ + Price↑' },
  { symbol: 'ETH/USDT:USDT', side: 'SHORT', confidence: 61.3, discoveryScore: 58.7, price: 3500, rsi14: 47.3, priceChg5m: -0.4, volSpike: 3.72, volDelta: 78, obImb: 0.43, oiDeltaPct: -0.02, oiDelta: 48, funding: 0.00044, fundingBar: 72, takerRatio: 1.10, takerBar: 58, buySellVolRatio: 0.92, buySellVolNetPct: -4.2, whaleScore: 46.0, whaleBar: 43, srProximity: 88.9, entryLow: 3490, entryHigh: 3518, stop: 3584, tp1: 3416, tp2: 3346, rr: 2.56, invalidation: '5m close above EMA50', riskUsd: 50, sizeUnits: 0.62, discoveryWhy: 'Volume burst 2.1x | Whale accumulation 72', why: 'EMA20<EMA50 | RSI 42.1 | Funding overheated' },
  { symbol: 'SOL/USDT:USDT', side: 'LONG', confidence: 55.3, discoveryScore: 59.5, price: 145, rsi14: 45.5, priceChg5m: 0.6, volSpike: 1.10, volDelta: 42, obImb: 0.46, oiDeltaPct: 0.87, oiDelta: 55, funding: 0.00006, fundingBar: 52, takerRatio: 1.06, takerBar: 51, buySellVolRatio: 1.15, buySellVolNetPct: 7.3, whaleScore: 53.8, whaleBar: 62, srProximity: 80.4, entryLow: 144.28, entryHigh: 145.44, stop: 141.52, tp1: 148.48, tp2: 151.38, rr: 2.48, invalidation: '5m close below EMA50', riskUsd: 50, sizeUnits: 14.99, discoveryWhy: 'Taker buy pressure | Positioning shift', why: 'EMA20>EMA50 | RSI 58.2 | OI↑ + Price↑' },
  { symbol: 'XRP/USDT:USDT', side: 'SHORT', confidence: 67.7, discoveryScore: 64.2, price: 0.62, rsi14: 66.7, priceChg5m: -0.3, volSpike: 2.49, volDelta: 71, obImb: 0.50, oiDeltaPct: 2.09, oiDelta: 68, funding: -0.00004, fundingBar: 48, takerRatio: 1.04, takerBar: 45, buySellVolRatio: 0.88, buySellVolNetPct: -6.1, whaleScore: 53.6, whaleBar: 58, srProximity: 76.6, entryLow: 0.618, entryHigh: 0.623, stop: 0.635, tp1: 0.605, tp2: 0.593, rr: 2.13, invalidation: '5m close above EMA50', riskUsd: 50, sizeUnits: 3506.3, discoveryWhy: 'Flow intensity 1.25 | OIΔ 2.3%', why: 'EMA20<EMA50 | RSI 42.1 | Funding overheated' },
  { symbol: 'LINK/USDT:USDT', side: 'LONG', confidence: 71.5, discoveryScore: 77.4, price: 18.5, rsi14: 51.0, priceChg5m: 0.5, volSpike: 1.66, volDelta: 58, obImb: 0.41, oiDeltaPct: -1.37, oiDelta: 41, funding: 0.00026, fundingBar: 55, takerRatio: 1.03, takerBar: 48, buySellVolRatio: 1.18, buySellVolNetPct: 8.4, whaleScore: 60.3, whaleBar: 71, srProximity: 67.3, entryLow: 18.41, entryHigh: 18.56, stop: 18.06, tp1: 18.94, tp2: 19.31, rr: 2.41, invalidation: '5m close below EMA50', riskUsd: 50, sizeUnits: 117.5, discoveryWhy: 'Flow intensity 1.25 | OIΔ 2.3%', why: 'EMA20>EMA50 | RSI 58.2 | OI↑ + Price↑' }
];

function updateConfDisplay() {
  document.getElementById('confVal').textContent = document.getElementById('minConf').value;
}

function normalizeValue(val, min, max) {
  return Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100));
}

function getBarHTML(label, value, displayVal, type = 'neutral') {
  const pct = Math.min(100, Math.max(0, Math.abs(value)));
  return `
    <div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${pct}%"></div>
      </div>
      <div class="bar-value">${displayVal}</div>
    </div>
  `;
}

function getRSIBarHTML(value) {
  const rsi = Math.min(100, Math.max(0, value));
  let type = rsi > 70 ? 'negative' : rsi < 30 ? 'positive' : 'neutral';
  return `
    <div class="bar-row">
      <div class="bar-label">RSI</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${rsi}%">${rsi.toFixed(1)}</div>
      </div>
      <div class="bar-value">${rsi > 70 ? 'Overbought' : rsi < 30 ? 'Oversold' : 'Neutral'}</div>
    </div>
  `;
}

function getVolMomBarHTML(volSpike, priceChg) {
  // Volume momentum: accelerating volume + price direction
  const momentum = Math.min(100, (volSpike || 1) * 30);
  const type = priceChg > 0 ? 'positive' : priceChg < 0 ? 'negative' : 'neutral';
  return `
    <div class="bar-row">
      <div class="bar-label">Vol MoM</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${momentum}%">${(volSpike || 0).toFixed(1)}x</div>
      </div>
      <div class="bar-value">${priceChg > 0 ? 'Accel +' : priceChg < 0 ? 'Accel -' : 'Flat'}</div>
    </div>
  `;
}

function getOICorrelationBarHTML(oiDeltaPct, priceChg) {
  // OI/Price correlation: positive OI + price moving = strong signal
  const oiPriceAligned = (oiDeltaPct > 0 && priceChg > 0) || (oiDeltaPct < 0 && priceChg < 0);
  const strength = Math.min(100, Math.abs(oiDeltaPct || 0) * 20 + 50);
  const type = oiPriceAligned ? 'positive' : 'negative';
  return `
    <div class="bar-row">
      <div class="bar-label">OI/Price</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${strength}%">${oiPriceAligned ? 'Aligned' : 'Divergent'}</div>
      </div>
      <div class="bar-value">${oiPriceAligned ? '✓ Confirm' : '⚠ Diverge'}</div>
    </div>
  `;
}

function getBuySellBarHTML(buySellVolRatio, buySellVolNetPct) {
  // Buy vs Sell volume: 0-100 where 50 is neutral
  const ratio = Math.min(100, Math.max(0, ((buySellVolRatio || 1) - 0.5) * 100));
  const type = ratio > 60 ? 'positive' : ratio < 40 ? 'negative' : 'neutral';
  return `
    <div class="bar-row">
      <div class="bar-label">Buy/Sell</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${ratio}%">${(buySellVolRatio || 0).toFixed(2)}</div>
      </div>
      <div class="bar-value">${(buySellVolNetPct || 0) > 0 ? '+' : ''}${(buySellVolNetPct || 0).toFixed(1)}%</div>
    </div>
  `;
}

function getRRBarHTML(rr) {
  // Risk:Reward quality: 1:1 = 33%, 2:1 = 66%, 3:1+ = 100%
  const rrVal = rr || 0;
  const quality = Math.min(100, (rrVal / 3) * 100);
  const type = rrVal >= 2 ? 'positive' : rrVal >= 1.5 ? 'neutral' : 'warning';
  return `
    <div class="bar-row">
      <div class="bar-label">R:R Quality</div>
      <div class="bar-container">
        <div class="bar-fill ${type}" style="width: ${quality}%">${rrVal.toFixed(2)}:1</div>
      </div>
      <div class="bar-value">${rrVal >= 2 ? 'Strong' : rrVal >= 1.5 ? 'Okay' : 'Weak'}</div>
    </div>
  `;
}

function transformAPIData(item) {
  // Convert API data to bar graph format
  return {
    ...item,
    volDelta: Math.min(100, (item.volSpike || 1) * 25),
    oiDelta: normalizeValue(item.oiDeltaPct || 0, -5, 5),
    fundingBar: normalizeValue(Math.abs(item.funding || 0), 0, 0.001),
    takerBar: normalizeValue(item.takerRatio || 1, 0.8, 1.2),
    whaleBar: item.whaleScore || 50,
    srProximity: item.srProximity || 50,
    buySellVolRatio: item.buySellVolRatio || 1,
    buySellVolNetPct: item.buySellVolNetPct || 0
  };
}

function renderCard(item) {
  const view = document.getElementById('view').value;
  const showDiscovery = view === 'discovery' || view === 'all';
  const showEntry = view === 'entries' || (view === 'all' && item.entryLow);
  
  let html = `
    <div class="card ${item.side}">
      <div class="card-header">
        <span class="symbol">${item.symbol}</span>
        <span class="side-badge ${item.side}">${item.side}</span>
      </div>
      <div class="card-scores">
        <div class="score-box">
          <div class="label">Confidence</div>
          <div class="value ${item.confidence >= 70 ? 'high' : item.confidence >= 50 ? 'med' : 'low'}">${item.confidence.toFixed(1)}</div>
        </div>
        ${showDiscovery ? `
        <div class="score-box">
          <div class="label">Discovery</div>
          <div class="value ${item.discoveryScore >= 70 ? 'high' : item.discoveryScore >= 50 ? 'med' : 'low'}">${item.discoveryScore.toFixed(1)}</div>
        </div>` : ''}
        ${item.rr ? `
        <div class="score-box">
          <div class="label">R:R</div>
          <div class="value ${item.rr >= 2 ? 'high' : item.rr >= 1.5 ? 'med' : 'low'}">${item.rr.toFixed(2)}</div>
        </div>` : ''}
        <div class="score-box">
          <div class="label">Price</div>
          <div class="value">$${item.price < 1 ? item.price.toFixed(6) : item.price.toFixed(2)}</div>
        </div>
      </div>
      
      ${view === 'entries' ? `
      <div class="bar-metrics">
        ${getRSIBarHTML(item.rsi14)}
        ${getVolMomBarHTML(item.volSpike, item.priceChg5m)}
        ${getOICorrelationBarHTML(item.oiDeltaPct, item.priceChg5m)}
        ${getBuySellBarHTML(item.buySellVolRatio, item.buySellVolNetPct)}
        ${getRRBarHTML(item.rr)}
      </div>
      ` : `
      <div class="bar-metrics">
        ${getBarHTML('Volume Δ', item.volDelta, item.volSpike.toFixed(1) + 'x', item.volDelta > 50 ? 'positive' : 'neutral')}
        ${getBarHTML('OI Delta', item.oiDelta, (item.oiDeltaPct > 0 ? '+' : '') + item.oiDeltaPct.toFixed(2) + '%', item.oiDeltaPct > 0 ? 'positive' : 'negative')}
        ${getBarHTML('Funding', item.fundingBar, (item.funding * 100).toFixed(4) + '%', item.funding > 0 ? 'warning' : 'neutral')}
        ${getBarHTML('Taker Flow', item.takerBar, item.takerRatio.toFixed(2), item.takerRatio > 1 ? 'positive' : 'negative')}
        ${getBarHTML('Whale Score', item.whaleBar, item.whaleScore.toFixed(1), item.whaleScore > 55 ? 'positive' : item.whaleScore < 45 ? 'negative' : 'neutral')}
        ${getBarHTML('S/R Prox', item.srProximity, item.srProximity.toFixed(0) + '%', item.srProximity > 75 ? 'positive' : 'neutral')}
      </div>
      `}
  `;
  
  if (showEntry && item.entryLow) {
    html += `
      <div class="entry-plan">
        <div class="entry-row"><span class="label">Entry Zone</span><span>$${item.entryLow.toFixed(6)} - $${item.entryHigh.toFixed(6)}</span></div>
        <div class="entry-row"><span class="label">Stop Loss</span><span style="color:#f85149">$${item.stop.toFixed(6)}</span></div>
        <div class="entry-row"><span class="label">TP1 / TP2</span><span style="color:#3fb950">$${item.tp1.toFixed(6)} / $${item.tp2.toFixed(6)}</span></div>
        <div class="entry-row"><span class="label">Size (Risk $${item.riskUsd})</span><span>${item.sizeUnits.toFixed(4)} units</span></div>
        <div class="entry-row" style="margin-top:8px;font-size:0.75rem;color:#8b949e">Invalidation: ${item.invalidation}</div>
      </div>
    `;
  }
  
  if (item.why || item.discoveryWhy) {
    html += `<div class="card-why" style="margin-top:10px;padding-top:10px;border-top:1px solid #30363d;font-size:0.8rem;color:#8b949e;">${item.discoveryWhy ? `<strong>Discovery:</strong> ${item.discoveryWhy}<br>` : ''}${item.why ? `<strong>Setup:</strong> ${item.why}` : ''}</div>`;
  }
  
  return html + '</div>';
}

function render() {
  const minConf = parseInt(document.getElementById('minConf').value);
  const topN = parseInt(document.getElementById('topN').value);
  const allowLong = document.getElementById('filterLong').checked;
  const allowShort = document.getElementById('filterShort').checked;
  
  let filtered = currentData.filter(i => i.confidence >= minConf)
    .filter(i => (i.side === 'LONG' && allowLong) || (i.side === 'SHORT' && allowShort));
  
  filtered = filtered.slice(0, topN);
  
  const resultsEl = document.getElementById('results');
  const statusEl = document.getElementById('status');
  
  if (filtered.length === 0) {
    resultsEl.innerHTML = '<div style="text-align:center;padding:60px;color:#8b949e;">No signals match filters</div>';
    statusEl.textContent = isLive ? 'No signals found' : 'Demo Mode - No matches';
    return;
  }
  
  resultsEl.innerHTML = filtered.map(item => renderCard(item)).join('');
  
  const tf = document.getElementById('timeframe').value;
  const apis = Array.from(document.getElementById('apis').selectedOptions).map(o => o.value).join(',');
  statusEl.textContent = `${isLive ? '🟢 LIVE' : '🟡 DEMO'} | ${filtered.length} signals | TF: ${tf} | APIs: ${apis}`;
  statusEl.className = 'status ' + (isLive ? 'live' : 'demo');
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  const statusEl = document.getElementById('status');
  const tf = document.getElementById('timeframe').value;
  const apis = Array.from(document.getElementById('apis').selectedOptions).map(o => o.value);
  
  if (apis.length === 0) {
    statusEl.textContent = 'Error: Select at least one API';
    statusEl.className = 'status error';
    return;
  }
  
  btn.disabled = true;
  statusEl.textContent = `Connecting to ${API_BASE}...`;
  
  try {
    // Try to fetch from local server
    const response = await fetch(`${API_BASE}/api/scan?timeframe=${tf}&providers=${apis.join(',')}&mode=union`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok) throw new Error('Server error');
    
    const data = await response.json();
    
    if (data.ok && data.data) {
      currentData = data.data.map(transformAPIData);
      isLive = true;
    } else {
      throw new Error('Invalid response');
    }
  } catch (err) {
    // Fallback to demo
    currentData = DEMO_DATA.map(transformAPIData);
    isLive = false;
    statusEl.textContent = `Server not running (${err.message}) - Using demo data`;
    statusEl.className = 'status demo';
  }
  
  btn.disabled = false;
  render();
}

// Initial load
refreshData();
  </script>
</body>
</html>
